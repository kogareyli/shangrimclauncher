<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion Microsoft</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #080810;
      font-family: 'Outfit', 'Segoe UI', sans-serif;
      color: #e8e8f4;
      user-select: none;
    }

    /* ── Barre custom ── */
    .titlebar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 40px; z-index: 9999;
      display: flex; align-items: center;
      background: #07070f;
      border-bottom: 1px solid rgba(124,58,237,0.35);
      -webkit-app-region: drag;
      padding: 0 12px;
    }

    .tb-logo {
      width: 20px; height: 20px; flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .tb-logo img {
      width: 100%; height: 100%; object-fit: contain; border-radius: 4px;
    }

    .tb-title {
      flex: 1; font-size: 13px; font-weight: 600;
      color: #9090b0; padding-left: 10px;
      -webkit-app-region: drag;
    }
    .tb-subtitle {
      font-size: 11px; font-weight: 400; color: #555580;
    }

    .tb-controls {
      display: flex; gap: 4px; -webkit-app-region: no-drag;
    }

    .ctrl-btn {
      width: 30px; height: 24px; border: none; border-radius: 6px;
      background: rgba(255,255,255,0.06); color: #9090b0;
      font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .ctrl-btn.red:hover { background: #ef4444; color: #fff; }

    /* ── Zone de chargement ── */
    .loading-bar {
      position: fixed; top: 40px; left: 0; right: 0; height: 2px; z-index: 9998;
      background: rgba(255,255,255,0.05);
    }
    .loading-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      width: 0%;
      transition: width 0.3s ease;
      animation: loading-pulse 1.5s ease-in-out infinite;
    }
    @keyframes loading-pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="tb-logo">
      <img src="../logo.png" alt="ShangriMc" draggable="false" />
    </div>
    <div class="tb-title">
      Connexion Microsoft
      <span class="tb-subtitle"> — ShangriMc</span>
    </div>
    <div class="tb-controls">
      <button class="ctrl-btn" id="btn-min" title="Réduire">
        <svg width="10" height="2" viewBox="0 0 10 2" fill="currentColor"><rect width="10" height="2" rx="1"/></svg>
      </button>
      <button class="ctrl-btn red" id="btn-close" title="Fermer">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>
      </button>
    </div>
  </div>

  <div class="loading-bar">
    <div class="loading-fill" id="loading-fill"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    document.getElementById('btn-min').addEventListener('click', () => {
      ipcRenderer.send('auth-minimize');
    });
    document.getElementById('btn-close').addEventListener('click', () => {
      ipcRenderer.send('auth-close');
    });

    // Animation de chargement
    const fill = document.getElementById('loading-fill');
    let pct = 0;
    const interval = setInterval(() => {
      pct = Math.min(pct + Math.random() * 15, 90);
      fill.style.width = pct + '%';
    }, 200);

    ipcRenderer.on('page-loaded', () => {
      clearInterval(interval);
      fill.style.width = '100%';
      setTimeout(() => { fill.style.opacity = '0'; }, 400);
    });
  </script>
</body>
</html>
