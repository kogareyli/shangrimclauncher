<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ShangriMc — Menu Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Cinzel', serif;
  }

  /* ── Background gradient ── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 80% at 20% 50%, rgba(10,30,80,0.65) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 50% 80%, rgba(5,20,60,0.35) 0%, transparent 60%),
      linear-gradient(160deg, #000510 0%, #000d20 40%, #000810 70%, #000508 100%);
  }

  /* Vignette bords */
  .vignette {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse 100% 100% at 50% 50%,
      transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  /* Brume / fog en bas */
  .fog {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 2;
    height: 280px;
    background: linear-gradient(to top, rgba(5,15,50,0.65) 0%, transparent 100%);
    pointer-events: none;
  }

  /* Particules */
  canvas {
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 3;
  }

  /* ── Panneau de droite ── */
  .panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 340px;
    z-index: 10;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 0 48px 0 40px;

    background: linear-gradient(
      to right,
      transparent 0%,
      rgba(0,5,20,0.75) 18%,
      rgba(0,5,20,0.93) 60%,
      rgba(0,5,20,0.99) 100%
    );
    backdrop-filter: blur(6px);
  }

  /* Ligne bleue gauche */
  .panel::before {
    content: '';
    position: absolute; left: 0; top: 15%; bottom: 15%;
    width: 2px;
    background: linear-gradient(to bottom,
      transparent 0%,
      rgba(40,100,220,0.55) 30%,
      rgba(80,160,255,0.95) 50%,
      rgba(40,100,220,0.55) 70%,
      transparent 100%
    );
  }

  /* ── Logo zone ── */
  .logo-area {
    margin-bottom: 52px;
  }

  .logo-emblem {
    width: 56px; height: 3px;
    background: linear-gradient(to right, rgba(60,130,255,0.9), rgba(60,130,255,0.1));
    margin-bottom: 18px;
  }

  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    text-shadow:
      0 0 20px rgba(80,150,255,0.75),
      0 0 50px rgba(40,100,220,0.35),
      0 2px 4px rgba(0,0,0,0.9);
    line-height: 1.1;
  }

  .title span {
    color: #60b0ff;
    text-shadow:
      0 0 15px rgba(80,180,255,0.9),
      0 0 35px rgba(40,120,255,0.45);
  }

  .subtitle {
    margin-top: 8px;
    font-size: 10px;
    font-family: 'Cinzel', serif;
    font-weight: 400;
    color: rgba(100,160,230,0.5);
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  /* ── Boutons ── */
  .nav {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 240px;
  }

  .btn {
    width: 100%;
    height: 42px;
    border: none; cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    text-align: left;
    padding-left: 22px;
  }

  /* shimmer */
  .btn::after {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.4s;
  }
  .btn:hover::after { left: 140%; }

  /* Rejoindre */
  .btn-join {
    background: linear-gradient(90deg, rgba(20,60,160,0.5) 0%, rgba(10,40,120,0.3) 100%);
    color: #c8e0ff;
    border-top: 1px solid rgba(60,140,255,0.5);
    border-bottom: 1px solid rgba(60,140,255,0.2);
    border-left: 3px solid rgba(80,160,255,0.9);
    border-right: none;
    text-shadow: 0 0 12px rgba(60,140,255,0.6);
    box-shadow: inset 0 0 20px rgba(30,80,200,0.15), 0 0 15px rgba(30,80,200,0.12);
  }
  .btn-join:hover {
    background: linear-gradient(90deg, rgba(30,80,200,0.65) 0%, rgba(20,60,160,0.45) 100%);
    border-left-color: rgba(140,200,255,1);
    color: #fff;
    transform: translateX(4px);
    box-shadow: inset 0 0 30px rgba(40,100,220,0.3), 0 0 28px rgba(40,120,255,0.25);
  }

  /* Séparateur */
  .sep {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, rgba(40,100,220,0.3) 0%, transparent 80%);
    margin: 4px 0;
  }

  /* Options */
  .btn-options {
    background: transparent;
    color: rgba(140,185,230,0.6);
    border-top: 1px solid rgba(60,120,220,0.1);
    border-bottom: 1px solid transparent;
    border-left: 3px solid rgba(40,100,200,0.3);
    border-right: none;
  }
  .btn-options:hover {
    background: rgba(40,100,200,0.07);
    border-left-color: rgba(80,160,255,0.75);
    color: rgba(180,220,255,0.9);
    transform: translateX(4px);
  }

  /* Quitter */
  .btn-quit {
    background: transparent;
    color: rgba(150,170,200,0.3);
    border: none;
    border-left: 3px solid transparent;
    font-size: 10px;
    letter-spacing: 4px;
  }
  .btn-quit:hover {
    border-left-color: rgba(220,80,80,0.5);
    color: rgba(220,100,100,0.75);
    transform: translateX(4px);
  }

  /* ── Version ── */
  .version {
    margin-top: 44px;
    font-size: 9px;
    font-family: 'Cinzel', serif;
    color: rgba(80,130,200,0.28);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Décoration bas gauche ── */
  .world-title {
    position: fixed;
    left: 48px; bottom: 60px;
    z-index: 5;
    pointer-events: none;
  }
  .world-title .wt-line {
    width: 60px; height: 1px;
    background: linear-gradient(to right, rgba(60,130,255,0.6), transparent);
    margin-bottom: 10px;
  }
  .world-title .wt-text {
    font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 6px;
    color: rgba(80,140,220,0.3);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="vignette"></div>
<div class="fog"></div>

<canvas id="c"></canvas>

<!-- Décoration bas gauche -->
<div class="world-title">
  <div class="wt-line"></div>
  <div class="wt-text">Forge 1.20.1</div>
</div>

<!-- Panneau droite -->
<div class="panel">

  <div class="logo-area">
    <div class="logo-emblem"></div>
    <div class="title">Shangri<span>Mc</span></div>
    <div class="subtitle">Forge &nbsp;·&nbsp; 1.20.1</div>
  </div>

  <div class="nav">
    <button class="btn btn-join">▶&nbsp;&nbsp;Rejoindre</button>
    <div class="sep"></div>
    <button class="btn btn-options">⚙&nbsp;&nbsp;Options</button>
    <button class="btn btn-quit">✕&nbsp;&nbsp;Quitter</button>
  </div>

  <div class="version">ShangriMc &nbsp;·&nbsp; v1.2.0</div>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H, particles = [];

function resize() {
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
}

function spawnParticles() {
  particles = [];
  // Étoiles fines
  for (let i = 0; i < 130; i++) {
    particles.push({
      type: 'star',
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 0.9 + 0.1,
      a: Math.random() * 0.7 + 0.1,
      da: (Math.random() - 0.5) * 0.004,
      vx: (Math.random() - 0.5) * 0.015,
      vy: (Math.random() - 0.5) * 0.015,
      // couleurs bleu/cyan/blanc
      color: Math.random() > 0.6
        ? [100, 180, 255]
        : Math.random() > 0.5
          ? [180, 220, 255]
          : [60, 120, 230]
    });
  }
  // Particules bleues montantes
  for (let i = 0; i < 35; i++) {
    particles.push({
      type: 'ember',
      x: Math.random() * W * 0.65,
      y: H + Math.random() * 60,
      r: Math.random() * 1.3 + 0.3,
      vy: -(Math.random() * 0.4 + 0.15),
      vx: (Math.random() - 0.5) * 0.2,
      life: 0, maxLife: Math.random() * 300 + 150,
      delay: Math.random() * 400
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (const p of particles) {
    if (p.type === 'star') {
      p.a = Math.max(0.05, Math.min(0.8, p.a + p.da));
      if (p.a <= 0.05 || p.a >= 0.8) p.da *= -1;
      p.x = (p.x + p.vx + W) % W;
      p.y = (p.y + p.vy + H) % H;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${p.a})`;
      ctx.fill();
    } else {
      if (p.delay > 0) { p.delay--; continue; }
      p.life++;
      if (p.life > p.maxLife) {
        p.life = 0;
        p.x = Math.random() * W * 0.65;
        p.y = H + 20;
        p.delay = Math.random() * 200;
      }
      const t = p.life / p.maxLife;
      const alpha = t < 0.15 ? t / 0.15 : t > 0.75 ? (1 - t) / 0.25 : 1;
      p.x += p.vx + Math.sin(p.life * 0.04) * 0.18;
      p.y += p.vy;
      // particule bleue
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(60,140,255,${alpha * 0.6})`;
      ctx.fill();
      // halo cyan
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(80,180,255,${alpha * 0.1})`;
      ctx.fill();
    }
  }

  requestAnimationFrame(draw);
}

resize(); spawnParticles(); draw();
window.addEventListener('resize', () => { resize(); spawnParticles(); });
</script>
</body>
</html>
